[agent]
system = "You are a concise command-line agent. Use the read-only workspace tools when they are useful."
max_turns = 8
timeout = "5m"

[openai]
model = "gpt-5-mini"
# Prefer ~/.ag/config.toml for local development; keep this unset in shared files.
api_key = ""
base_url = ""
max_retries = 2

[workspace]
root = "."
max_read_bytes = 65536

[logging]
level = "info"
format = "json"
# file defaults to ~/.ag/logs/ag.log
console = false

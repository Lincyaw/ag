syntax = "proto3";

package pluginrpc.v1;

option go_package = "github.com/lincyaw/ag/pluginrpc/v1;pluginv1";

import "google/protobuf/struct.proto";

enum FailurePolicy {
  FAILURE_POLICY_UNSPECIFIED = 0;
  FAILURE_POLICY_FAIL_CLOSED = 1;
  FAILURE_POLICY_CONTINUE = 2;
}

enum ActionKind {
  ACTION_KIND_UNSPECIFIED = 0;
  ACTION_KIND_STEP = 1;
  ACTION_KIND_STOP = 2;
  ACTION_KIND_INJECT = 3;
}

enum OperationState {
  OPERATION_STATE_UNSPECIFIED = 0;
  OPERATION_STATE_PENDING = 1;
  OPERATION_STATE_RUNNING = 2;
  OPERATION_STATE_SUCCEEDED = 3;
  OPERATION_STATE_FAILED = 4;
  OPERATION_STATE_CANCELLED = 5;
}

enum OperationKind {
  OPERATION_KIND_UNSPECIFIED = 0;
  OPERATION_KIND_PROVIDER = 1;
  OPERATION_KIND_TOOL = 2;
  OPERATION_KIND_CAPABILITY = 3;
}

message Manifest {
  string name = 1;
  string version = 2;
  string description = 3;
  uint32 api_version = 4;
  repeated string requires = 5;
  repeated string conflicts = 6;
  repeated string registers = 7;
  uint32 min_api_version = 8;
  uint32 max_api_version = 9;
}

message ProviderSpec {
  string name = 1;
  string model = 2;
}

message ToolSpec {
  string name = 1;
  string description = 2;
  google.protobuf.Struct parameters = 3;
}

message HookSpec {
  string name = 1;
  string event = 2;
  int32 priority = 3;
  FailurePolicy failure_policy = 4;
  int64 timeout_millis = 5;
}

message SubscriberSpec {
  string name = 1;
  repeated string events = 2;
  int64 timeout_millis = 3;
}

message CapabilitySpec {
  string name = 1;
  string description = 2;
  google.protobuf.Struct input_schema = 3;
  google.protobuf.Struct output_schema = 4;
}

message EventContract {
  string name = 1;
  repeated string mutable_fields = 2;
  bool allow_block = 3;
  bool allow_action = 4;
}

message DescribeResponse {
  Manifest manifest = 1;
  repeated ProviderSpec providers = 2;
  repeated ToolSpec tools = 3;
  repeated HookSpec hooks = 4;
  repeated CapabilitySpec capabilities = 5;
  repeated EventContract events = 6;
  repeated SubscriberSpec subscribers = 7;
}

message DescribeRequest {}

message ToolCall {
  string id = 1;
  string name = 2;
  google.protobuf.Struct arguments = 3;
}

message Message {
  string role = 1;
  string content = 2;
  repeated ToolCall tool_calls = 3;
  string tool_call_id = 4;
}

message Usage {
  int64 input_tokens = 1;
  int64 output_tokens = 2;
}

message ModelRequest {
  repeated Message messages = 1;
  repeated ToolSpec tools = 2;
}

message ModelResponse {
  string content = 1;
  repeated ToolCall tool_calls = 2;
  string model = 3;
  string finish_reason = 4;
  Usage usage = 5;
}

message ToolResult {
  string content = 1;
  bool is_error = 2;
}

message EventEnvelope {
  string id = 1;
  string name = 2;
  string session_id = 3;
  uint64 generation = 4;
  google.protobuf.Struct payload = 5;
}

message Block {
  string reason = 1;
  string kind = 2;
}

message Cause {
  string code = 1;
  string detail = 2;
  bool final = 3;
}

message Action {
  ActionKind kind = 1;
  Cause cause = 2;
  repeated Message messages = 3;
}

message Effect {
  google.protobuf.Struct patch = 1;
  Block block = 2;
  Action action = 3;
}

message OperationRequest {
  string idempotency_key = 1;
  google.protobuf.Struct input = 2;
}

message SubmitOperationRequest {
  OperationKind kind = 1;
  string resource = 2;
  OperationRequest request = 3;
}

message SubmitOperationResponse {
  Operation operation = 1;
}

message PollOperationRequest {
  OperationKind kind = 1;
  string resource = 2;
  string id = 3;
  uint64 after_revision = 4;
}

message PollOperationResponse {
  Operation operation = 1;
}

message CancelOperationRequest {
  OperationKind kind = 1;
  string resource = 2;
  string id = 3;
}

message CancelOperationResponse {
  Operation operation = 1;
}

message Operation {
  string id = 1;
  string idempotency_key = 2;
  OperationState state = 3;
  uint64 revision = 4;
  google.protobuf.Struct output = 5;
  string error = 6;
  int64 submitted_unix_milli = 7;
  int64 updated_unix_milli = 8;
}

message HandleHookRequest {
  string hook = 1;
  EventEnvelope event = 2;
}

message HandleHookResponse {
  Effect effect = 1;
}

message Delivery {
  string id = 1;
  uint64 sequence = 2;
  string plugin = 3;
  string subscription = 4;
  string partition = 5;
  EventEnvelope event = 6;
  int32 attempt = 7;
  string plugin_version = 8;
  string resource_revision = 9;
}

message DeliverRequest {
  Delivery delivery = 1;
}

message DeliverResponse {
  bool accepted = 1;
}

message Registration {
  string name = 1;
  string uri = 2;
  Manifest manifest = 3;
}

message RegisterRequest {
  Registration registration = 1;
  int64 ttl_millis = 2;
}

message RegisterResponse {
  Lease lease = 1;
}

message Lease {
  string id = 1;
  int64 expires_unix_milli = 2;
}

message RenewRequest {
  string id = 1;
  int64 ttl_millis = 2;
}

message RenewResponse {
  Lease lease = 1;
}

message UnregisterRequest {
  string id = 1;
}

message UnregisterResponse {}

message ListRegistrationsRequest {}

message ListRegistrationsResponse {
  repeated Registration registrations = 1;
}

service PluginService {
  rpc Describe(DescribeRequest) returns (DescribeResponse);
  rpc SubmitOperation(SubmitOperationRequest)
      returns (SubmitOperationResponse);
  rpc PollOperation(PollOperationRequest) returns (PollOperationResponse);
  rpc CancelOperation(CancelOperationRequest)
      returns (CancelOperationResponse);
  rpc HandleHook(HandleHookRequest) returns (HandleHookResponse);
  rpc Deliver(DeliverRequest) returns (DeliverResponse);
}

service RegistryService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Renew(RenewRequest) returns (RenewResponse);
  rpc Unregister(UnregisterRequest) returns (UnregisterResponse);
  rpc ListRegistrations(ListRegistrationsRequest)
      returns (ListRegistrationsResponse);
}
